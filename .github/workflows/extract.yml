name: extract

# STAGE 1 of the pipeline. Scheduled + manually dispatchable. On success it triggers
# `transform` (see transform.yml -> on.workflow_run). Later stages run ONLY if this one
# succeeds, so bad/absent extracts never propagate.
#
# PoC note: raw data is committed back to the repo (that is this PoC's "storage layer").
# In production the raw landing zone would be object storage (S3/GCS) and stages would pass
# a run id, not git commits. See documentation/architecture.md.

on:
  schedule:
    # Weekly (ABQ publishes weekly; NY monthly, LA quarterly — a real deploy would split
    # these into per-source schedules or a matrix). Monday 11:00 UTC.
    - cron: "0 11 * * 1"
  workflow_dispatch:
    inputs:
      source:
        description: "Single source key to extract (blank = all enabled)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: inspections-pipeline
  cancel-in-progress: false

jobs:
  extract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install poppler (pdftotext)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync

      - name: Extract
        run: |
          if [ -n "${{ github.event.inputs.source }}" ]; then
            uv run inspections extract --source "${{ github.event.inputs.source }}"
          else
            uv run inspections extract
          fi

      - name: Commit raw + state + errors
        run: |
          git config user.name "inspections-bot"
          git config user.email "inspections-bot@users.noreply.github.com"
          git add data/raw data/state data/errors
          git commit -m "extract: ${{ github.run_id }} ($(date -u +%FT%TZ))" || echo "no changes to commit"
          git push
