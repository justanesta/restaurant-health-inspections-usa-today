name: ci

# Quality gate on every push / PR: lint + the hermetic test suite (no live network).
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install poppler (pdftotext for the ABQ extractor)
        run: sudo apt-get update && sudo apt-get install -y poppler-utils

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Schema is in sync (fails if inspection.schema.json is stale)
        run: |
          uv run python -m inspections.schema_gen
          git diff --exit-code schema/inspection.schema.json

      - name: Tests
        run: uv run pytest -m "not network" -q
