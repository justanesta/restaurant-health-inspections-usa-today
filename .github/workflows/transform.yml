name: transform

# STAGE 2. Triggered ONLY when `extract` completes successfully (workflow_run), or manually.
# Normalizes raw -> staging (per-source JSON), validating each record against the pydantic
# contract. On success it triggers `load`.

on:
  workflow_run:
    workflows: ["extract"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: inspections-pipeline
  cancel-in-progress: false

jobs:
  transform:
    # Gate: only proceed if the upstream extract succeeded (or a human dispatched this).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Pull the branch HEAD so we see the raw data the extract stage just committed.
          ref: ${{ github.event.workflow_run.head_branch || github.ref_name }}

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - run: uv sync

      - name: Transform
        run: uv run inspections transform

      - name: Commit staging + state + errors
        run: |
          git config user.name "inspections-bot"
          git config user.email "inspections-bot@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add data/staging data/state data/errors
          git commit -m "transform: ${{ github.run_id }} ($(date -u +%FT%TZ))" || echo "no changes to commit"
          git push
